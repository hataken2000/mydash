<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MyDash ウィジェット</title>
<style>
:root {
  --bg: #0f1117; --card: #1e2130; --border: #2d3250;
  --text: #e8eaf6; --muted: #8b90aa; --accent: #00afcc;
  --danger: #ef5350; --success: #66bb6a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  user-select: none;
}
#header {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
}
#clock {
  font-size: 30px; font-weight: 800; color: var(--accent);
  letter-spacing: 2px; font-variant-numeric: tabular-nums;
}
#date { font-size: 11px; color: var(--muted); margin-top: 3px; }
#tasks { flex: 1; overflow-y: auto; padding: 10px 12px; }
.section-label {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin: 10px 0 4px;
}
.section-label:first-child { margin-top: 0; }
.task-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 8px; cursor: pointer;
  transition: background 0.1s;
}
.task-row:hover { background: var(--card); }
.task-check {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all 0.1s;
}
.task-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.task-title { flex: 1; line-height: 1.3; }
.task-title.done { text-decoration: line-through; color: var(--muted); }
.empty { color: var(--muted); font-size: 12px; padding: 6px 8px; }
#footer {
  padding: 8px 12px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
#last-updated { font-size: 10px; color: var(--muted); }
button {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; font-family: inherit; transition: all 0.1s;
}
button:hover { border-color: var(--accent); color: var(--accent); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="header">
  <div id="clock">--:--:--</div>
  <div id="date">----年--月--日（-）</div>
</div>
<div id="tasks"></div>
<div id="footer">
  <span id="last-updated"></span>
  <button onclick="window.close()">閉じる</button>
</div>
<script>
const KEY = 'mydash_v1';
const DAYS = ['日','月','火','水','木','金','土'];

function tick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss;
  document.getElementById('date').textContent =
    now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日（' + DAYS[now.getDay()] + '）';
}
setInterval(tick, 1000);
tick();

function loadAndRender() {
  let db;
  try { db = JSON.parse(localStorage.getItem(KEY)) || { items: [] }; }
  catch (_) { db = { items: [] }; }
  render(db);
  document.getElementById('last-updated').textContent =
    '更新: ' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

function render(db) {
  const todayStr = new Date().toISOString().slice(0, 10);
  const undone = (db.items || []).filter(i => i.type === 'task' && (i.status || 'todo') !== 'done');
  const overdue = undone.filter(i => i.dueDate && i.dueDate < todayStr);
  const today   = undone.filter(i => i.dueDate === todayStr);
  const el = document.getElementById('tasks');
  if (overdue.length === 0 && today.length === 0) {
    el.innerHTML = '<div class="empty">今日のタスクはありません 🎉</div>';
    return;
  }
  let html = '';
  if (overdue.length) {
    html += '<div class="section-label">🔴 期限超過</div>' + overdue.map(taskRow).join('');
  }
  if (today.length) {
    html += '<div class="section-label">📅 今日締切</div>' + today.map(taskRow).join('');
  }
  el.innerHTML = html;
}

function taskRow(t) {
  const done = t.status === 'done';
  return '<div class="task-row" onclick="toggleDone(\'' + esc(t.id) + '\')">' +
    '<div class="task-check ' + (done ? 'done' : '') + '">' + (done ? '✓' : '') + '</div>' +
    '<div class="task-title ' + (done ? 'done' : '') + '">' + escHtml(t.title) + '</div>' +
    '</div>';
}

function toggleDone(id) {
  let db;
  try { db = JSON.parse(localStorage.getItem(KEY)) || { items: [] }; }
  catch (_) { db = { items: [] }; }
  const item = (db.items || []).find(i => i.id === id);
  if (!item) return;
  item.status = (item.status === 'done') ? 'todo' : 'done';
  localStorage.setItem(KEY, JSON.stringify(db));
  render(db);
}


function esc(s) { return String(s).replace(/'/g, "\\'"); }
function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

window.resizeTo(300, 540);
loadAndRender();
setInterval(loadAndRender, 30000);
</script>
</body>
</html>
