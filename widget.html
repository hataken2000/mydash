<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MyDash ウィジェット</title>
<style>
:root {
  --bg: #0f1117; --card: #1e2130; --border: #2d3250;
  --text: #e8eaf6; --muted: #8b90aa; --accent: #00afcc;

  --icon-priority-medium: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iY3VycmVudENvbG9yIj48cmVjdCB4PSI1IiB5PSIzIiB3aWR0aD0iMyIgaGVpZ2h0PSIxMiIgcng9IjEuNSIvPjxyZWN0IHg9IjUiIHk9IjE4IiB3aWR0aD0iMyIgaGVpZ2h0PSIzIiByeD0iMS41Ii8+PHJlY3QgeD0iMTYiIHk9IjMiIHdpZHRoPSIzIiBoZWlnaHQ9IjEyIiByeD0iMS41Ii8+PHJlY3QgeD0iMTYiIHk9IjE4IiB3aWR0aD0iMyIgaGVpZ2h0PSIzIiByeD0iMS41Ii8+PC9zdmc+');
  --icon-priority-low:    url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iY3VycmVudENvbG9yIj48cmVjdCB4PSIxMC41IiB5PSIzIiB3aWR0aD0iMyIgaGVpZ2h0PSIxMiIgcng9IjEuNSIvPjxyZWN0IHg9IjEwLjUiIHk9IjE4IiB3aWR0aD0iMyIgaGVpZ2h0PSIzIiByeD0iMS41Ii8+PC9zdmc+');
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  user-select: none;
}
#header {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
}
#clock {
  font-size: 30px; font-weight: 800; color: var(--accent);
  letter-spacing: 2px; font-variant-numeric: tabular-nums;
}
#date { font-size: 11px; color: var(--muted); margin-top: 3px; }
#content { flex: 1; overflow-y: auto; padding: 10px 12px; }
.section-label {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin: 14px 0 6px; display: flex; align-items: center; gap: 5px;
}
.section-label:first-child { margin-top: 0; }
/* sqp-itemと同様のスタイル */
.w-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 8px; cursor: pointer;
  transition: background 0.12s; border: 1px solid var(--border);
  background: var(--card); margin-bottom: 5px;
  color: var(--text); text-decoration: none; font-size: 13px;
}
.w-item:hover { background: #262b40; border-color: #3d4460; }
.w-item .w-icon {
  flex-shrink: 0; width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.w-item .w-icon img { width: 20px; height: 20px; object-fit: contain; border-radius: 3px; }
.w-item .w-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.w-item .w-sub { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.w-item.set-item .w-title { color: #a99ff8; }
.w-item.task-done .w-title { text-decoration: line-through; color: var(--muted); }
.w-item.task-overdue { border-color: rgba(239,83,80,0.4); }
.w-item.task-overdue .w-sub { color: var(--danger); }
.empty { color: var(--muted); font-size: 12px; padding: 6px 8px; }
#footer {
  padding: 8px 12px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
#last-updated { font-size: 10px; color: var(--muted); }
button {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; font-family: inherit; transition: all 0.1s;
}
button:hover { border-color: var(--accent); color: var(--accent); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.w-svg { display:flex; align-items:center; justify-content:center; flex-shrink:0; }
#toast {
  position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
  background: #2d3250; color: var(--text); font-size: 11px;
  padding: 5px 12px; border-radius: 12px; border: 1px solid var(--border);
  opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
}
</style>
</head>
<body>
<div id="header">
  <div id="clock">--:--:--</div>
  <div id="date">----年--月--日（-）</div>
</div>
<div id="content"></div>
<div id="toast"></div>
<div id="footer">
  <span id="last-updated"></span>
  <div style="display:flex;gap:6px">
    <button onclick="openMyDash()">MyDashを開く</button>
    <button onclick="window.close()">閉じる</button>
  </div>
</div>
<script>
const KEY = 'mydash_v1';
const DAYS = ['日','月','火','水','木','金','土'];
const bc = new BroadcastChannel('mydash-widget');

const SVG_SET = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/></svg>`;
const SVG_TASK = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>`;

function tick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss;
  document.getElementById('date').textContent =
    now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日（' + DAYS[now.getDay()] + '）';
}
setInterval(tick, 1000);
tick();

function loadAndRender() {
  let db;
  try { db = JSON.parse(localStorage.getItem(KEY)) || { items: [] }; }
  catch (_) { db = { items: [] }; }
  render(db);
  document.getElementById('last-updated').textContent =
    '更新: ' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

function getTodayAlarmSets(db) {
  const now = new Date();
  const todayDay = now.getDay();
  const todayDate = now.getDate();
  const todayMonth = now.getMonth() + 1;
  return (db.items || []).filter(item => {
    if (item.type !== 'set') return false;
    const alarm = item.alarm;
    if (!alarm || !alarm.enabled) return false;
    const s = alarm.schedule;
    switch (s.type) {
      case 'daily': return true;
      case 'weekly': return (s.days || []).includes(todayDay);
      case 'monthly': return s.day === todayDate;
      case 'yearly': return s.month === todayMonth && s.day === todayDate;
      default: return false;
    }
  }).sort((a, b) => (a.alarm.schedule.time || '').localeCompare(b.alarm.schedule.time || ''));
}

function render(db) {
  const todayStr = new Date().toISOString().slice(0, 10);
  const sets = getTodayAlarmSets(db);
  const tasks = (db.items || [])
    .filter(i => i.type === 'task' && i.dueDate && (i.status || 'todo') !== 'done')
    .sort((a, b) => {
      const aOver = a.dueDate < todayStr, bOver = b.dueDate < todayStr;
      if (aOver !== bOver) return aOver ? 1 : -1;
      return a.dueDate.localeCompare(b.dueDate);
    });

  let html = '';

  if (sets.length) {
    html += `<div class="section-label"><span class="w-svg" style="color:var(--muted);width:11px;height:11px">${SVG_SET}</span>今日のセット</div>`;
    html += sets.map(s => setRow(s)).join('');
  }

  if (tasks.length) {
    html += `<div class="section-label"><span class="w-svg" style="color:var(--muted);width:11px;height:11px">${SVG_TASK}</span>タスク</div>`;
    html += tasks.map(t => taskRow(t, todayStr)).join('');
  }

  if (!html) html = '<div class="empty">今日の予定はありません 🎉</div>';

  document.getElementById('content').innerHTML = html;
}

function itemIcon(item, svgInline) {
  if (!item.icon) return `<span class="w-svg" style="color:var(--muted);width:18px;height:18px">${svgInline}</span>`;
  if (/^https?:|^\/|^data:/.test(item.icon)) return `<img src="${escHtml(item.icon)}" style="width:18px;height:18px;object-fit:contain;border-radius:3px">`;
  return `<span style="font-size:15px;line-height:1">${escHtml(item.icon)}</span>`;
}

function setRow(item) {
  const time = item.alarm?.schedule?.time || '';
  return `<div class="w-item set-item" onclick="openPanel('${esc(item.id)}')">
    <span class="w-icon">${itemIcon(item, SVG_SET)}</span>
    <span class="w-title">${escHtml(item.title)}</span>
    <span class="w-sub">${time}</span>
  </div>`;
}

const PRIORITY_COLOR = { high: '#ef5350', medium: '#f59e42', low: '#66bb6a' };

function priorityIcon(priority) {
  if (!priority || priority === 'medium') return '';
  const color = PRIORITY_COLOR[priority] || 'var(--muted)';
  return `<span style="-webkit-mask-image:var(--icon-priority-${priority});mask-image:var(--icon-priority-${priority});background-color:${color};width:12px;height:12px;display:inline-block;flex-shrink:0;vertical-align:middle"></span>`;
}

function taskRow(t, todayStr) {
  const isOverdue = t.dueDate < todayStr;
  const d = new Date(t.dueDate + 'T00:00:00');
  const dateStr = (d.getMonth() + 1) + '/' + d.getDate();
  const pri = priorityIcon(t.priority);
  return `<div class="w-item${isOverdue ? ' task-overdue' : ''}" onclick="openQuickEdit('${esc(t.id)}')">
    <span class="w-icon">${itemIcon(t, SVG_TASK)}</span>
    <span class="w-title" style="display:flex;align-items:center;gap:4px">${pri}${escHtml(t.title)}</span>
    <span class="w-sub">${dateStr}</span>
  </div>`;
}

function openPanel(id) {
  bc.postMessage({ cmd: 'openPanel', id });
}

function openQuickEdit(id) {
  bc.postMessage({ cmd: 'openQuickEdit', id });
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function openMyDash() {
  fetch('http://127.0.0.1:3737/open-mydash')
    .then(r => r.json())
    .then(d => {
      if (d.result === 'found') showToast('MyDashを前面に出しました');
      else showToast('MyDashを開きました');
    })
    .catch(() => showToast('サーバーに接続できません'));
}

function esc(s) { return String(s).replace(/'/g, "\\'"); }
function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

window.resizeTo(300, 560);
loadAndRender();
setInterval(loadAndRender, 30000);
</script>
</body>
</html>
